<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单功能测试</title>
    <link rel="stylesheet" href="assets/system.css">
    <style>
        body {
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 300px;
            background: #001727;
            padding: 20px;
            border-radius: 8px;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 4px;
        }
        .success { color: #52c41a; }
        .error { color: #ff4d4f; }
        .info { color: #1890ff; }
    </style>
</head>
<body>
    <div class="test-container">
        <nav class="sidebar-menu">
            <div class="menu-section">
                <div class="menu-item menu-item-parent" id="test-menu-parent">
                    <span class="menu-icon">📋</span>
                    <span class="menu-text">测试菜单</span>
                    <span class="menu-arrow">▶</span>
                </div>
                <div class="submenu" id="test-submenu">
                    <a href="#" class="submenu-item">子菜单项1</a>
                    <a href="#" class="submenu-item">子菜单项2</a>
                    <a href="#" class="submenu-item">子菜单项3</a>
                </div>
            </div>
        </nav>
    </div>

    <div class="test-result" id="test-result">
        <h3>测试结果</h3>
        <div id="test-output"></div>
    </div>

    <script src="assets/page-interactions.js"></script>
    <script>
        const output = document.getElementById('test-output');
        const results = [];

        function log(message, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = message;
            output.appendChild(p);
            results.push({ message, type });
            console.log(message);
        }

        // 等待页面加载完成
        window.addEventListener('DOMContentLoaded', function() {
            log('开始测试菜单功能...', 'info');

            const menuParent = document.getElementById('test-menu-parent');
            const submenu = document.getElementById('test-submenu');

            // 测试1: 检查元素是否存在
            if (!menuParent || !submenu) {
                log('❌ 测试失败: 菜单元素未找到', 'error');
                return;
            }
            log('✅ 测试1通过: 菜单元素存在', 'success');

            // 测试2: 检查初始状态
            const initialHasOpen = submenu.classList.contains('open');
            const initialMaxHeight = window.getComputedStyle(submenu).maxHeight;
            log(`测试2: 初始状态 - open类: ${initialHasOpen}, max-height: ${initialMaxHeight}`, 'info');

            // 初始化菜单
            if (typeof PageInteractions !== 'undefined' && PageInteractions.initMenu) {
                PageInteractions.initMenu();
                log('✅ 测试3通过: initMenu函数已调用', 'success');
            } else {
                log('❌ 测试3失败: PageInteractions.initMenu未找到', 'error');
            }

            // 测试4: 点击菜单展开
            setTimeout(function() {
                log('测试4: 点击菜单项...', 'info');
                menuParent.click();

                setTimeout(function() {
                    const hasOpen = submenu.classList.contains('open');
                    const computedMaxHeight = window.getComputedStyle(submenu).maxHeight;
                    const inlineMaxHeight = submenu.style.maxHeight;
                    const computedDisplay = window.getComputedStyle(submenu).display;
                    const computedOpacity = window.getComputedStyle(submenu).opacity;
                    const computedVisibility = window.getComputedStyle(submenu).visibility;

                    log(`测试4结果:`, 'info');
                    log(`  - open类: ${hasOpen}`, hasOpen ? 'success' : 'error');
                    log(`  - 计算样式max-height: ${computedMaxHeight}`, computedMaxHeight !== '0px' ? 'success' : 'error');
                    log(`  - 内联样式max-height: ${inlineMaxHeight}`, inlineMaxHeight ? 'success' : 'info');
                    log(`  - 计算样式display: ${computedDisplay}`, computedDisplay !== 'none' ? 'success' : 'error');
                    log(`  - 计算样式opacity: ${computedOpacity}`, computedOpacity !== '0' ? 'success' : 'error');
                    log(`  - 计算样式visibility: ${computedVisibility}`, computedVisibility !== 'hidden' ? 'success' : 'error');

                    // 检查是否可见
                    const isVisible = computedMaxHeight !== '0px' && 
                                     computedDisplay !== 'none' && 
                                     computedOpacity !== '0' && 
                                     computedVisibility !== 'hidden';

                    if (isVisible) {
                        log('✅ 测试4通过: 菜单成功展开并可见', 'success');
                    } else {
                        log('❌ 测试4失败: 菜单展开但不可见', 'error');
                    }

                    // 测试5: 再次点击折叠
                    setTimeout(function() {
                        log('测试5: 再次点击菜单项折叠...', 'info');
                        menuParent.click();

                        setTimeout(function() {
                            const hasOpenAfter = submenu.classList.contains('open');
                            const computedMaxHeightAfter = window.getComputedStyle(submenu).maxHeight;
                            
                            log(`测试5结果:`, 'info');
                            log(`  - open类: ${hasOpenAfter}`, !hasOpenAfter ? 'success' : 'error');
                            log(`  - 计算样式max-height: ${computedMaxHeightAfter}`, computedMaxHeightAfter === '0px' ? 'success' : 'error');

                            if (!hasOpenAfter && computedMaxHeightAfter === '0px') {
                                log('✅ 测试5通过: 菜单成功折叠', 'success');
                            } else {
                                log('❌ 测试5失败: 菜单折叠异常', 'error');
                            }

                            // 总结
                            const successCount = results.filter(r => r.type === 'success').length;
                            const errorCount = results.filter(r => r.type === 'error').length;
                            log(`\n测试完成: 成功 ${successCount} 项, 失败 ${errorCount} 项`, 
                                errorCount === 0 ? 'success' : 'error');
                        }, 100);
                    }, 500);
                }, 100);
            }, 500);
        });
    </script>
</body>
</html>
