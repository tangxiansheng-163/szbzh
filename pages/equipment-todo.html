<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">待办事项</span>
        </div>

        <div class="page-header">
            <p class="page-description">查看和处理设备管理相关的待办事项，包括维护计划、巡检任务、故障处理、告警处理等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="任务编号、设备名称">
                </div>
                <div class="filter-item">
                    <label>事项类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="maintenance">维护计划</option>
                        <option value="inspection">巡检任务</option>
                        <option value="fault">故障处理</option>
                        <option value="alert">告警处理</option>
                        <option value="repair">维修任务</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="pending">待处理</option>
                        <option value="processing">处理中</option>
                        <option value="completed">已完成</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-default">批量处理</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="list-table-nowrap">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">事项类型</th>
                            <th width="200">标题</th>
                            <th width="150">设备名称</th>
                            <th width="100">优先级</th>
                            <th width="100">状态</th>
                            <th width="120">创建时间</th>
                            <th width="120">截止时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="todo-id" value="1"></td>
                            <td>维护计划</td>
                            <td>设备A定期保养</td>
                            <td>生产设备A-001</td>
                            <td><span class="status-badge status-warning">中</span></td>
                            <td><span class="status-badge status-warning">待处理</span></td>
                            <td>2025-01-20</td>
                            <td>2025-01-25</td>
                            <td>
                                <button class="btn btn-sm btn-primary">处理</button>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="todo-id" value="2"></td>
                            <td>故障处理</td>
                            <td>设备B故障上报</td>
                            <td>生产设备B-002</td>
                            <td><span class="status-badge status-error">高</span></td>
                            <td><span class="status-badge status-processing">处理中</span></td>
                            <td>2025-01-22</td>
                            <td>2025-01-23</td>
                            <td>
                                <button class="btn btn-sm btn-primary">处理</button>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 2 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('待办事项 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
