<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多周期统计 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">能源统计分析</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">多周期统计</span>
        </div>

        <div class="page-header">
            <p class="page-description">按日、周、月、年等多周期统计能源消耗数据，支持不同周期的对比分析。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>统计周期</label>
                    <select class="form-select">
                        <option value="day">日</option>
                        <option value="week">周</option>
                        <option value="month">月</option>
                        <option value="year">年</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>时间范围</label>
                    <input type="date" class="form-input">
                </div>
                <div class="filter-item">
                    <label>至</label>
                    <input type="date" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">多周期能耗统计</h3>
            </div>
            <div class="card-body">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">日均能耗</div>
                        <div class="stat-value">41,667 kWh</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">周均能耗</div>
                        <div class="stat-value">291,667 kWh</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">月均能耗</div>
                        <div class="stat-value">1,250,000 kWh</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">年均能耗</div>
                        <div class="stat-value">15,000,000 kWh</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 4px; text-align: center; color: #999;">
                    多周期能耗趋势图表展示区域（可集成ECharts等图表库）
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('多周期统计 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
