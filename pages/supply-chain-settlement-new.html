            window.submitInvoice = submitInvoice;
            window.removeFile = removeFile;
            window.previewPaymentVoucher = previewPaymentVoucher;
            window.openBasisDetail = openBasisDetail;
            window.openCreateSettlementModal = openCreateSettlementModal;
            window.onBuyerChange = onBuyerChange;
            window.toggleAllOrders = toggleAllOrders;
            window.toggleOrder = toggleOrder;
            window.toggleException = toggleException;
            window.submitCreateSettlement = submitCreateSettlement;
            window.editSettlement = openEditSettlementModal;
            window.deleteSettlement = confirmDeleteSettlement;
            window.printSettlement = printSettlement;
            window.exportSettlement = exportSettlement;
            window.exportAllSettlements = exportAllSettlements;
            window.printAllSettlements = printAllSettlements;

            // 新建结算单相关变量
            var createSettlementData = {
                buyer: null,
                selectedOrders: [],
                selectedExceptions: []
            };

            // 打开新建结算单弹窗
            function openCreateSettlementModal() {
                createSettlementData = { buyer: null, selectedOrders: [], selectedExceptions: [] };
                resetCreateSettlementForm();
                loadBuyers();
                openModal('create-settlement-modal');
            }

            // 重置表单
            function resetCreateSettlementForm() {
                document.getElementById('create-buyer').value = '';
                document.getElementById('buyer-info').style.display = 'none';
                document.getElementById('orders-section').style.display = 'none';
                document.getElementById('exceptions-section').style.display = 'none';
                document.getElementById('settlement-info-section').style.display = 'none';
                document.getElementById('btn-create-settlement').disabled = true;
                document.getElementById('orders-tbody').innerHTML = '';
                document.getElementById('exceptions-content').innerHTML = '';
                document.getElementById('select-all-orders').checked = false;
                // 清除编辑模式
                document.getElementById('create-settlement-modal').dataset.editMode = 'false';
                document.getElementById('create-settlement-modal').dataset.editId = '';
                document.querySelector('#create-settlement-modal .modal-title').textContent = '新建结算单';
                document.getElementById('btn-create-settlement').textContent = '创建结算单';
            }

            // 加载采购方列表
            function loadBuyers() {
                if (!window.FinanceCollabStore) return;
                var buyers = window.FinanceCollabStore.getBuyers();
                var select = document.getElementById('create-buyer');
                select.innerHTML = '<option value="">请选择采购方</option>';
                buyers.forEach(function(b) {
                    var option = document.createElement('option');
                    option.value = b.code;
                    option.textContent = b.name + ' (' + b.code + ')';
                    select.appendChild(option);
                });
            }

            // 采购方选择变化
            function onBuyerChange() {
                var buyerCode = document.getElementById('create-buyer').value;
                if (!buyerCode) {
                    resetCreateSettlementForm();
                    return;
                }
                
                if (!window.FinanceCollabStore) return;
                var buyers = window.FinanceCollabStore.getBuyers();
                createSettlementData.buyer = buyers.find(function(b) { return b.code === buyerCode; });
                
                // 显示采购方信息
                document.getElementById('buyer-code').textContent = createSettlementData.buyer.code;
                document.getElementById('contract-id').textContent = createSettlementData.buyer.contract.id;
                document.getElementById('payment-term').textContent = createSettlementData.buyer.paymentTerm;
                document.getElementById('contract-name').textContent = createSettlementData.buyer.contract.name;
                document.getElementById('buyer-info').style.display = 'block';
                
                // 加载采购订单
                loadOrders(buyerCode);
                // 加载异常单据
                loadExceptions(buyerCode);
                
                document.getElementById('orders-section').style.display = 'block';
                document.getElementById('exceptions-section').style.display = 'block';
                document.getElementById('settlement-info-section').style.display = 'block';
            }

            // 加载销售订单（乙方视角，按采购方）
            function loadOrders(buyerCode) {
                var orders = window.FinanceCollabStore.getPendingSalesOrders(buyerCode);
                var tbody = document.getElementById('orders-tbody');
                tbody.innerHTML = '';
                
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #8c8c8c; padding: 20px;">该采购方暂无未结算的销售订单</td></tr>';
                    return;
                }
                
                orders.forEach(function(order, index) {
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td><input type="checkbox" class="order-checkbox" data-index="' + index + '" onchange="toggleOrder(' + index + ')"></td>' +
                        '<td>' + order.id + '</td>' +
                        '<td>' + order.date + '</td>' +
                        '<td style="text-align: right;">' + money(order.amount) + '</td>';
                    tbody.appendChild(tr);
                });
            }

            // 全选/取消全选订单
            function toggleAllOrders() {
                var checked = document.getElementById('select-all-orders').checked;
                var checkboxes = document.querySelectorAll('.order-checkbox');
                checkboxes.forEach(function(cb, index) {
                    cb.checked = checked;
                    toggleOrder(index, checked);
                });
            }

            // 选择/取消选择订单
            function toggleOrder(index, forceChecked) {
                var checkbox = document.querySelector('.order-checkbox[data-index="' + index + '"]');
                if (!checkbox) return;
                
                var isChecked = forceChecked !== undefined ? forceChecked : checkbox.checked;
                checkbox.checked = isChecked;
                
                var orders = window.FinanceCollabStore.getPendingSalesOrders(createSettlementData.buyer.code);
                var order = orders[index];
                
                if (isChecked) {
                    if (!createSettlementData.selectedOrders.find(function(o) { return o.id === order.id; })) {
                        createSettlementData.selectedOrders.push(order);
                    }
                } else {
                    createSettlementData.selectedOrders = createSettlementData.selectedOrders.filter(function(o) { return o.id !== order.id; });
                }
                
                updateCalculation();
            }

            // 加载异常单据（乙方视角，按采购方）
            function loadExceptions(buyerCode) {
                var exceptions = window.FinanceCollabStore.getPendingBuyerExceptions(buyerCode);
                var container = document.getElementById('exceptions-content');
                container.innerHTML = '';
                
                var hasExceptions = false;
                var html = '';
                
                // 退货单
                if (exceptions.returns && exceptions.returns.length > 0) {
                    hasExceptions = true;
                    html += '<div style="margin-bottom: 12px;"><strong style="font-size: 13px; color: #262626;">退货单</strong>';
                    exceptions.returns.forEach(function(ret, idx) {
                        if (!ret.usedInSettlement) {
                            html += '<div style="display: flex; align-items: center; padding: 8px; background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; margin-top: 8px;">' +
                                '<input type="checkbox" style="margin-right: 8px;" onchange="toggleException(\'return\', \'' + ret.id + '\', ' + idx + ')">' +
                                '<div style="flex: 1; font-size: 13px;">' +
                                '<div>' + ret.id + ' <span style="color: #8c8c8c;">(' + ret.reason + ')</span></div>' +
                                '<div style="color: #ff4d4f;">-' + money(ret.amount) + '</div>' +
                                '</div></div>';
                        }
                    });
                    html += '</div>';
                }
                
                // 换货单
                if (exceptions.exchanges && exceptions.exchanges.length > 0) {
                    hasExceptions = true;
                    html += '<div style="margin-bottom: 12px;"><strong style="font-size: 13px; color: #262626;">换货单</strong>';
                    exceptions.exchanges.forEach(function(exc, idx) {
                        if (!exc.usedInSettlement) {
                            html += '<div style="display: flex; align-items: center; padding: 8px; background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; margin-top: 8px;">' +
                                '<input type="checkbox" style="margin-right: 8px;" onchange="toggleException(\'exchange\', \'' + exc.id + '\', ' + idx + ')">' +
                                '<div style="flex: 1; font-size: 13px;">' +
                                '<div>' + exc.id + '</div>' +
                                '<div style="color: #595959;">换货数量：' + exc.items[0].quantity + '</div>' +
                                '</div></div>';
                        }
                    });
                    html += '</div>';
                }
                
                // 让步接收
                if (exceptions.concessions && exceptions.concessions.length > 0) {
                    hasExceptions = true;
                    html += '<div style="margin-bottom: 12px;"><strong style="font-size: 13px; color: #262626;">让步接收</strong>';
                    exceptions.concessions.forEach(function(con, idx) {
                        if (!con.usedInSettlement) {
                            html += '<div style="display: flex; align-items: center; padding: 8px; background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; margin-top: 8px;">' +
                                '<input type="checkbox" style="margin-right: 8px;" onchange="toggleException(\'concession\', \'' + con.id + '\', ' + idx + ')">' +
                                '<div style="flex: 1; font-size: 13px;">' +
                                '<div>' + con.id + '</div>' +
                                '<div style="color: #ff4d4f;">-' + money(con.amount) + ' <span style="color: #8c8c8c;">(' + con.items[0].reason + ')</span></div>' +
                                '</div></div>';
                        }
                    });
                    html += '</div>';
                }
                
                if (!hasExceptions) {
                    html = '<div style="color: #8c8c8c; font-size: 13px; padding: 12px; text-align: center;">该供应商暂无未结算的异常单据</div>';
                }
                
                container.innerHTML = html;
            }

            // 选择/取消选择异常单据
            function toggleException(type, id, idx) {
                var exceptions = window.FinanceCollabStore.getPendingBuyerExceptions(createSettlementData.buyer.code);
                var data;
                if (type === 'return') data = exceptions.returns[idx];
                else if (type === 'exchange') data = exceptions.exchanges[idx];
                else if (type === 'concession') data = exceptions.concessions[idx];
                
                var existingIndex = createSettlementData.selectedExceptions.findIndex(function(e) { 
                    return e.type === type && e.data.id === id; 
                });
                
                if (existingIndex >= 0) {
                    createSettlementData.selectedExceptions.splice(existingIndex, 1);
                } else {
                    createSettlementData.selectedExceptions.push({ type: type, data: data });
                }
                
                updateCalculation();
            }

            // 更新计算
            function updateCalculation() {
                var ordersTotal = createSettlementData.selectedOrders.reduce(function(sum, o) { return sum + (o.amount || 0); }, 0);
                var returnsTotal = 0, concessionTotal = 0;
                
                createSettlementData.selectedExceptions.forEach(function(exc) {
                    if (exc.type === 'return') returnsTotal += (exc.data.amount || 0);
                    else if (exc.type === 'concession') concessionTotal += (exc.data.amount || 0);
                });
                
                var settlementAmount = ordersTotal - returnsTotal - concessionTotal;
                
                // 计算结算周期和应付日期
                var now = new Date();
                var year = now.getFullYear();
                var month = String(now.getMonth() + 1).padStart(2, '0');
                var period = year + '-' + month;
                
                var dueDate = '';
                if (createSettlementData.buyer) {
                    var paymentDays = parseInt(createSettlementData.buyer.paymentTerm.replace(/[^0-9]/g, '')) || 30;
                    var due = new Date(now.getTime() + paymentDays * 24 * 60 * 60 * 1000);
                    dueDate = due.getFullYear() + '-' + String(due.getMonth() + 1).padStart(2, '0') + '-' + String(due.getDate()).padStart(2, '0');
                }
                
                // 更新显示
                document.getElementById('selected-orders-amount').textContent = money(ordersTotal);
                document.getElementById('calc-orders-total').textContent = money(ordersTotal);
                document.getElementById('calc-returns-total').textContent = '-' + money(returnsTotal);
                document.getElementById('calc-concession-total').textContent = '-' + money(concessionTotal);
                document.getElementById('calc-settlement-amount').textContent = money(settlementAmount);
                document.getElementById('settlement-period').value = period;
                document.getElementById('settlement-due-date').value = dueDate;
                
                // 启用/禁用创建按钮
                document.getElementById('btn-create-settlement').disabled = createSettlementData.selectedOrders.length === 0;
            }

            // 提交创建结算单
            function submitCreateSettlement() {
                if (createSettlementData.selectedOrders.length === 0) {
                    alert('请至少选择一个采购订单');
                    return;
                }
                
                var isEdit = document.getElementById('create-settlement-modal').dataset.editMode === 'true';
                var editId = document.getElementById('create-settlement-modal').dataset.editId;
                
                var params = {
                    buyerCode: createSettlementData.buyer.code,
                    period: document.getElementById('settlement-period').value,
                    dueDate: document.getElementById('settlement-due-date').value,
                    selectedOrders: createSettlementData.selectedOrders,
                    selectedExceptions: createSettlementData.selectedExceptions
                };
                
                var result;
                if (isEdit && editId) {
                    // 编辑模式
                    result = window.FinanceCollabStore.editSettlement(editId, params, 'B');
                    if (result.ok) {
                        alert('结算单编辑成功：' + result.settlement.id);
                        closeModal('create-settlement-modal');
                        renderAll();
                    } else {
                        alert('编辑失败：' + result.message);
                    }
                } else {
                    // 创建模式
                    params.creatorRole = 'B'; // 乙方创建
                    result = window.FinanceCollabStore.createSettlement(params);
                    if (result.ok) {
                        alert('结算单创建成功：' + result.settlement.id);
                        closeModal('create-settlement-modal');
                        currentSettlementId = result.settlement.id;
                        renderAll();
                    } else {
                        alert('创建失败：' + result.message);
                    }
                }
            }
            
            // 打开编辑结算单弹窗
            function openEditSettlementModal(settlementId) {
                var store = getStore();
                var s = store.settlements.find(function(x) { return x.id === settlementId; });
                if (!s) return;
                
                // 检查权限
                if (!window.FinanceCollabStore.canEditOrDelete(s, 'B')) {
                    alert('无权限编辑该结算单');
                    return;
                }
                
                // 设置编辑模式
                document.getElementById('create-settlement-modal').dataset.editMode = 'true';
                document.getElementById('create-settlement-modal').dataset.editId = settlementId;
                document.querySelector('#create-settlement-modal .modal-title').textContent = '编辑结算单';
                document.getElementById('btn-create-settlement').textContent = '保存修改';
                
                // 初始化数据
                createSettlementData = {
                    supplier: null,
                    selectedOrders: s.basis.orders || [],
                    selectedExceptions: []
                };
                
                // 构建已选异常单据
                (s.basis.returns || []).forEach(function(r) {
                    createSettlementData.selectedExceptions.push({ type: 'return', data: r });
                });
                (s.basis.exchanges || []).forEach(function(e) {
                    createSettlementData.selectedExceptions.push({ type: 'exchange', data: e });
                });
                (s.basis.concessions || []).forEach(function(c) {
                    createSettlementData.selectedExceptions.push({ type: 'concession', data: c });
                });
                
                // 加载供应商列表并选中
                loadSuppliers();
                var supplierCode = s.partyB.supplierCode;
                document.getElementById('create-supplier').value = supplierCode;
                
                // 触发供应商选择
                onSupplierChange();
                
                // 恢复已选订单和异常单据的选中状态
                setTimeout(function() {
                    // 选中订单
                    var orders = window.FinanceCollabStore.getPendingOrders(supplierCode);
                    orders.forEach(function(order, idx) {
                        var isSelected = s.basis.orders.some(function(o) { return o.id === order.id; });
                        if (isSelected) {
                            var checkbox = document.querySelector('.order-checkbox[data-index="' + idx + '"]');
                            if (checkbox) {
                                checkbox.checked = true;
                                toggleOrder(idx, true);
                            }
                        }
                    });
                }, 100);
                
                openModal('create-settlement-modal');
            }
            
            // 确认删除结算单
            function confirmDeleteSettlement(settlementId) {
                if (!confirm('确定要删除该结算单吗？删除后不可恢复。')) return;
                
                var result = window.FinanceCollabStore.deleteSettlement(settlementId, 'B');
                if (result.ok) {
                    alert('结算单已删除');
                    currentSettlementId = null;
                    renderAll();
                } else {
                    alert('删除失败：' + result.message);
                }
            }

            ensureAssetLoaded(function() {
                document.getElementById('filter-keyword').oninput = renderList;
                document.getElementById('filter-status').onchange = renderList;
