<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同编辑 - 采购协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <form id="contract-edit-form">
            <p class="page-description" style="margin-bottom:16px;">编辑合同基本信息，修改后点击保存。</p>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px 20px;">
                <div class="form-item">
                    <label class="form-label">合同模板</label>
                    <select class="form-select" name="contractTemplate">
                        <option value="framework" selected>采购框架合同模板</option>
                        <option value="single">单次采购合同模板</option>
                        <option value="material">物料采购合同模板</option>
                        <option value="custom">自定义模板</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">合同编号</label>
                    <input type="text" class="form-input" name="contractNo" value="CT-2025-001" readonly style="background:#f5f5f5;">
                </div>
                <div class="form-item">
                    <label class="form-label">合同名称 <span style="color:#ff4d4f;">*</span></label>
                    <input type="text" class="form-input" name="contractName" required value="电子元器件年度框架采购合同">
                </div>
                <div class="form-item">
                    <label class="form-label">合同来源</label>
                    <input type="text" class="form-input" value="需求申请" readonly style="background:#f5f5f5;">
                </div>
                <div class="form-item">
                    <label class="form-label">供应商 <span style="color:#ff4d4f;">*</span></label>
                    <input type="text" class="form-input" name="supplier" required value="深圳市电子科技有限公司">
                </div>
                <div class="form-item">
                    <label class="form-label">合同类型</label>
                    <select class="form-select" name="contractType">
                        <option value="framework" selected>框架合同</option>
                        <option value="single">单次合同</option>
                        <option value="service">服务合同</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">合同金额（元） <span style="color:#ff4d4f;">*</span></label>
                    <input type="number" class="form-input" name="amount" required step="0.01" min="0" value="5000000">
                </div>
                <div class="form-item">
                    <label class="form-label">签署日期</label>
                    <input type="date" class="form-input" name="signDate" value="2025-01-01">
                </div>
                <div class="form-item">
                    <label class="form-label">到期日期</label>
                    <input type="date" class="form-input" name="endDate" value="2025-12-31">
                </div>
                <div class="form-item">
                    <label class="form-label">合同状态</label>
                    <input type="text" class="form-input" value="执行中" readonly style="background:#f5f5f5;">
                </div>
                <div class="form-item">
                    <label class="form-label">推送状态</label>
                    <input type="text" class="form-input" value="已推送" readonly style="background:#f5f5f5;">
                </div>
            </div>
            <div class="section-title" style="margin:16px 0 8px; font-size:13px; font-weight:600;">合同明细</div>
            <div class="table-wrapper" style="border:1px solid var(--border-color); border-radius:var(--radius-sm); overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead style="background:#fafafa;">
                        <tr>
                            <th style="padding:8px 10px; text-align:left;">物料编码</th>
                            <th style="padding:8px 10px; text-align:left;">物料名称</th>
                            <th style="padding:8px 10px; text-align:left;">规格型号</th>
                            <th style="padding:8px 10px; text-align:right;">数量</th>
                            <th style="padding:8px 10px; text-align:left;">单位</th>
                            <th style="padding:8px 10px; text-align:left;">需求到货日期</th>
                            <th style="padding:8px 10px; text-align:right;">含税单价</th>
                            <th style="padding:8px 10px; text-align:right;">税率(%)</th>
                            <th style="padding:8px 10px; text-align:right;">含税金额</th>
                            <th style="padding:8px 10px; text-align:right;">不含税金额</th>
                        </tr>
                    </thead>
                    <tbody id="contract-edit-detail-body">
                        <tr style="border-bottom:1px solid #f0f0f0;">
                            <td style="padding:8px 10px;">M-2025-001</td>
                            <td style="padding:8px 10px;">电子元器件A</td>
                            <td style="padding:8px 10px;">型号X</td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-qty" value="1000" style="width:70px;text-align:right;"></td>
                            <td style="padding:8px 10px;">个</td>
                            <td style="padding:8px 10px;"><input type="date" class="form-input" value="2025-06-30" style="width:120px;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-price" value="10.00" style="width:70px;text-align:right;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-rate" value="13" style="width:50px;text-align:right;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-amount-tax" value="10000.00" readonly style="width:90px;text-align:right;background:#f5f5f5;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-amount-notax" value="8849.56" readonly style="width:90px;text-align:right;background:#f5f5f5;"></td>
                        </tr>
                        <tr style="border-bottom:1px solid #f0f0f0;">
                            <td style="padding:8px 10px;">M-2025-002</td>
                            <td style="padding:8px 10px;">电子元器件B</td>
                            <td style="padding:8px 10px;">型号Y</td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-qty" value="500" style="width:70px;text-align:right;"></td>
                            <td style="padding:8px 10px;">个</td>
                            <td style="padding:8px 10px;"><input type="date" class="form-input" value="2025-06-30" style="width:120px;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-price" value="20.00" style="width:70px;text-align:right;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-rate" value="13" style="width:50px;text-align:right;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-amount-tax" value="10000.00" readonly style="width:90px;text-align:right;background:#f5f5f5;"></td>
                            <td style="padding:8px 10px; text-align:right;"><input type="text" class="form-input contract-edit-amount-notax" value="8849.56" readonly style="width:90px;text-align:right;background:#f5f5f5;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p style="margin-top:8px; text-align:right; font-size:13px; font-weight:600;">合计含税金额：<strong id="contract-edit-total-tax">20,000.00</strong>　合计不含税金额：<strong id="contract-edit-total-notax">17,699.12</strong></p>
            <div class="form-actions" style="padding-top:12px; border-top:1px solid #eee;">
                <button type="button" class="btn btn-default" data-close-modal="edit-modal">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
    <script>
    (function() {
        var form = document.getElementById('contract-edit-form');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var name = form.querySelector('[name="contractName"]');
                if (!name || !name.value.trim()) { alert('请填写合同名称'); return; }
                if (typeof PageInteractions !== 'undefined') PageInteractions.closeModal('edit-modal');
                alert('合同已保存（原型模拟）。');
            });
        }
        var id = (typeof location !== 'undefined' && location.search) ? (location.search.match(/[?&]id=([^&]*)/) || [])[1] : '';
        if (id && form) form.setAttribute('data-id', id);

        function recalcEditRow(tr) {
            var qty = parseFloat((tr.querySelector('.contract-edit-qty') && tr.querySelector('.contract-edit-qty').value) || '0') || 0;
            var price = parseFloat((tr.querySelector('.contract-edit-price') && tr.querySelector('.contract-edit-price').value) || '0') || 0;
            var rate = parseFloat((tr.querySelector('.contract-edit-rate') && tr.querySelector('.contract-edit-rate').value) || '0') || 0;
            var taxAmt = price * qty;
            var notaxAmt = (rate >= 0 && rate <= 100) ? taxAmt / (1 + rate / 100) : taxAmt;
            var taxEl = tr.querySelector('.contract-edit-amount-tax');
            var notaxEl = tr.querySelector('.contract-edit-amount-notax');
            if (taxEl) taxEl.value = taxAmt.toFixed(2);
            if (notaxEl) notaxEl.value = notaxAmt.toFixed(2);
        }
        function updateEditTotals() {
            var tbody = document.getElementById('contract-edit-detail-body');
            var totalTaxEl = document.getElementById('contract-edit-total-tax');
            var totalNotaxEl = document.getElementById('contract-edit-total-notax');
            if (!tbody || !totalTaxEl || !totalNotaxEl) return;
            var sumTax = 0, sumNotax = 0;
            tbody.querySelectorAll('tr').forEach(function(tr) {
                recalcEditRow(tr);
                var taxInput = tr.querySelector('.contract-edit-amount-tax');
                var notaxInput = tr.querySelector('.contract-edit-amount-notax');
                if (taxInput && taxInput.value) sumTax += parseFloat(taxInput.value) || 0;
                if (notaxInput && notaxInput.value) sumNotax += parseFloat(notaxInput.value) || 0;
            });
            totalTaxEl.textContent = sumTax.toFixed(2);
            totalNotaxEl.textContent = sumNotax.toFixed(2);
        }
        var tbody = document.getElementById('contract-edit-detail-body');
        if (tbody) {
            tbody.querySelectorAll('.contract-edit-qty, .contract-edit-price, .contract-edit-rate').forEach(function(input) {
                input.addEventListener('input', updateEditTotals);
                input.addEventListener('change', updateEditTotals);
            });
            updateEditTotals();
        }
    })();
    </script>
</body>
</html>
