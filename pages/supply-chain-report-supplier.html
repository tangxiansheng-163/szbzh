<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商报表 - 供应链协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/supply-chain-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">报表管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">供应商报表</span>
        </div>

        <div class="page-header">
            <p class="page-description">供应商相关统计分析报表，包括供应商绩效、合作情况、订单分布、协同效率等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>报表类型</label>
                    <select class="form-select">
                        <option value="performance">绩效统计</option>
                        <option value="cooperation">合作情况</option>
                        <option value="order-distribution">订单分布</option>
                        <option value="collaboration">协同效率</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>统计周期</label>
                    <select class="form-select">
                        <option value="month">月度</option>
                        <option value="quarter">季度</option>
                        <option value="year">年度</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>周期</label>
                    <input type="month" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">导出</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">供应商绩效统计</h3>
            </div>
            <div class="card-body">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">合作供应商数</div>
                        <div class="stat-value">25</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">平均交付及时率</div>
                        <div class="stat-value">93.5%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">平均质量合格率</div>
                        <div class="stat-value">97.2%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">A级供应商</div>
                        <div class="stat-value">8</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 4px; text-align: center; color: #999;">
                    图表展示区域（可集成ECharts等图表库）
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('供应商报表 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
