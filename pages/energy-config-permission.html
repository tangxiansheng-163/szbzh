<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限配置 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">系统配置</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">权限配置</span>
        </div>

        <div class="page-header">
            <p class="page-description">配置能源系统的用户权限，包括角色管理、权限分配、菜单权限等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="角色名称、用户名称">
                </div>
                <div class="filter-item">
                    <label>角色类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="admin">管理员</option>
                        <option value="manager">经理</option>
                        <option value="analyst">分析师</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建角色</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="list-table-nowrap">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">角色编码</th>
                            <th width="150">角色名称</th>
                            <th width="100">角色类型</th>
                            <th width="100">用户数量</th>
                            <th width="100">状态</th>
                            <th width="120">创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="role-id" value="1"></td>
                            <td>ROLE-004</td>
                            <td>能源管理员</td>
                            <td>管理员</td>
                            <td>5</td>
                            <td><span class="status-badge status-success">已启用</span></td>
                            <td>2025-01-10</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-default">编辑</button>
                                <button class="btn btn-sm btn-primary">权限</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('权限配置 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
