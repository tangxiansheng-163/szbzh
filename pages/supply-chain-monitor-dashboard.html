<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控大屏 - 供应链协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/supply-chain-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">监控与分析</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">监控大屏</span>
        </div>

        <div class="page-header">
            <p class="page-description">供应链监控大屏，实时展示订单状态、交付情况、异常预警等关键指标。</p>
        </div>

        <div class="card">
            <div class="card-body">
                <div style="padding: 40px; background: #001727; border-radius: 4px; text-align: center; color: #fff; min-height: 500px;">
                    <h3 style="color: #fff; margin-bottom: 30px;">供应链监控大屏</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 4px;">
                            <div style="font-size: 14px; margin-bottom: 10px;">订单总数</div>
                            <div style="font-size: 32px; font-weight: bold;">78</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 4px;">
                            <div style="font-size: 14px; margin-bottom: 10px;">执行中订单</div>
                            <div style="font-size: 32px; font-weight: bold;">45</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 4px;">
                            <div style="font-size: 14px; margin-bottom: 10px;">异常订单</div>
                            <div style="font-size: 32px; font-weight: bold; color: #ff4d4f;">5</div>
                        </div>
                    </div>
                    <div style="color: #999; font-size: 14px;">
                        实时数据图表展示区域（可集成ECharts、D3.js等图表库）
                        <br>包括订单状态分布、交付进度、异常趋势等可视化图表
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('监控大屏 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
