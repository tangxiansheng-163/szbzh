<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能流图 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">能源在线监测</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">能流图</span>
        </div>

        <div class="page-header">
            <p class="page-description">可视化展示能源流向，包括能源输入、转换、分配、消耗等全流程。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>能源类型</label>
                    <select class="form-select">
                        <option value="electricity">电力</option>
                        <option value="gas">天然气</option>
                        <option value="steam">蒸汽</option>
                        <option value="water">水</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">刷新</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">能流图</h3>
            </div>
            <div class="card-body">
                <div style="padding: 40px; background: #f5f5f5; border-radius: 4px; text-align: center; color: #999; min-height: 400px;">
                    能流图可视化展示区域（可集成D3.js、ECharts等图表库）
                    <br><br>
                    展示能源从输入到各车间、产线、设备的流向和消耗情况
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('能流图 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
