<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建设计任务</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">任务管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">创建设计任务</span>

        <div class="page-header">
            <p class="page-description">须从技术任务拆解分配，不可独立创建；请由技术任务详情进入拆解</p>

        <div class="card">

                    </div>
                    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        <a href="pages/tech-task-list.html" class="btn btn-primary">技术任务列表</a>
                        <a href="pages/design-task-assign.html" class="btn btn-default">分配设计任务</a>

                </div>
            </div>
        </div>

    <script>
        console.log('创建设计任务 页面已加载');
