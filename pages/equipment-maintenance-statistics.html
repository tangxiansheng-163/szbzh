<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效率统计 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">维护管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">效率统计</span>
        </div>

        <div class="page-header">
            <p class="page-description">统计维护效率，包括维护及时率、维护完成率、平均维护时间、维护成本等指标。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>统计周期</label>
                    <select class="form-select">
                        <option value="month">月度</option>
                        <option value="quarter">季度</option>
                        <option value="year">年度</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>周期</label>
                    <input type="month" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">维护效率统计</h3>
            </div>
            <div class="card-body">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">维护及时率</div>
                        <div class="stat-value">95.5%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">维护完成率</div>
                        <div class="stat-value">98.2%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">平均维护时间</div>
                        <div class="stat-value">2.5小时</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">维护成本</div>
                        <div class="stat-value">¥125,000</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 4px; text-align: center; color: #999;">
                    维护效率趋势图表展示区域（可集成ECharts等图表库）
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('效率统计 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
