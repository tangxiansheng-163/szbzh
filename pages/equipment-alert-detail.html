<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备告警详情</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="card">
            <div class="card-header"><h3 class="card-title">告警信息</h3></div>
            <div class="card-body">
                <div class="form-info-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;">
                    <div class="form-info-item"><span class="form-info-label">告警编号</span><span class="form-info-value">AL-2025-001</span></div>
                    <div class="form-info-item"><span class="form-info-label">告警类型</span><span class="form-info-value">参数异常</span></div>
                    <div class="form-info-item"><span class="form-info-label">告警级别</span><span class="form-info-value"><span class="status-badge status-error">紧急</span></span></div>
                    <div class="form-info-item"><span class="form-info-label">处理状态</span><span class="form-info-value"><span class="status-badge status-warning">待处理</span></span></div>
                    <div class="form-info-item"><span class="form-info-label">设备编码</span><span class="form-info-value">EQ-001</span></div>
                    <div class="form-info-item"><span class="form-info-label">设备名称</span><span class="form-info-value">空压机A</span></div>
                    <div class="form-info-item"><span class="form-info-label">触发时间</span><span class="form-info-value">2025-01-29 10:30</span></div>
                    <div class="form-info-item"><span class="form-info-label">处理人</span><span class="form-info-value">张运维</span></div>
                    <div class="form-info-item" style="grid-column:1/-1;"><span class="form-info-label">告警内容</span><span class="form-info-value">温度异常，当前温度85℃，超出阈值80℃</span></div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><h3 class="card-title">处理信息</h3></div>
            <div class="card-body">
                <div class="form-info-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;">
                    <div class="form-info-item"><span class="form-info-label">处理结果</span><span class="form-info-value">—</span></div>
                    <div class="form-info-item"><span class="form-info-label">处理时间</span><span class="form-info-value">—</span></div>
                    <div class="form-info-item" style="grid-column:1/-1;"><span class="form-info-label">处理说明</span><span class="form-info-value">待处理</span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
