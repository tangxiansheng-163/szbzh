<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维护记录 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">维护管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">维护记录</span>
        </div>

        <div class="page-header">
            <p class="page-description">查看设备维护记录，包括巡检记录、保养记录、维修记录等历史维护信息。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="记录编号、设备名称">
                </div>
                <div class="filter-item">
                    <label>维护类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="inspection">巡检</option>
                        <option value="maintenance">保养</option>
                        <option value="repair">维修</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>维护日期</label>
                    <input type="date" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">记录编号</th>
                            <th width="150">设备名称</th>
                            <th width="100">维护类型</th>
                            <th width="120">维护人</th>
                            <th width="200">维护内容</th>
                            <th width="120">维护日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="record-id" value="1"></td>
                            <td>REC-2025-001</td>
                            <td>生产设备A-001</td>
                            <td>保养</td>
                            <td>维护员A</td>
                            <td>定期保养，更换润滑油，检查运行状态</td>
                            <td>2025-01-20</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('维护记录 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
