<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义报表 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">报表管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">自定义报表</span>
        </div>

        <div class="page-header">
            <p class="page-description">创建和管理自定义报表，包括报表设计、数据源配置、报表预览、报表导出等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="报表名称">
                </div>
                <div class="filter-item">
                    <label>报表类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="table">表格报表</option>
                        <option value="chart">图表报表</option>
                        <option value="mixed">混合报表</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建报表</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">报表编号</th>
                            <th width="200">报表名称</th>
                            <th width="100">报表类型</th>
                            <th width="150">数据源</th>
                            <th width="100">状态</th>
                            <th width="120">创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="report-id" value="1"></td>
                            <td>RPT-2025-001</td>
                            <td>月度能耗统计报表</td>
                            <td>图表报表</td>
                            <td>能耗数据表</td>
                            <td><span class="status-badge status-success">已启用</span></td>
                            <td>2025-01-15</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-default">编辑</button>
                                <button class="btn btn-sm btn-primary">预览</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('自定义报表 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
