<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巡检管理 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">维护管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">巡检管理</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理设备巡检任务，包括巡检计划制定、巡检任务分配、巡检记录、异常处理等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="巡检任务编号、设备名称">
                </div>
                <div class="filter-item">
                    <label>巡检状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="pending">待巡检</option>
                        <option value="inspecting">巡检中</option>
                        <option value="completed">已完成</option>
                        <option value="overdue">已逾期</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>巡检日期</label>
                    <input type="date" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建巡检任务</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">任务编号</th>
                            <th width="150">设备名称</th>
                            <th width="100">巡检类型</th>
                            <th width="120">巡检人</th>
                            <th width="120">计划日期</th>
                            <th width="120">完成日期</th>
                            <th width="100">巡检状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="inspection-id" value="1"></td>
                            <td>INS-2025-001</td>
                            <td>生产设备A-001</td>
                            <td>日常巡检</td>
                            <td>巡检员A</td>
                            <td>2025-01-25</td>
                            <td>-</td>
                            <td><span class="status-badge status-warning">待巡检</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary">开始巡检</button>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="inspection-id" value="2"></td>
                            <td>INS-2025-002</td>
                            <td>安全设备B-002</td>
                            <td>定期巡检</td>
                            <td>巡检员B</td>
                            <td>2025-01-24</td>
                            <td>2025-01-24</td>
                            <td><span class="status-badge status-success">已完成</span></td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 2 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('巡检管理 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
