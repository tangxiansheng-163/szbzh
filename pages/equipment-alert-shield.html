<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警屏蔽 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">告警管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">告警屏蔽</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理告警屏蔽规则，包括临时屏蔽、计划屏蔽、条件屏蔽等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="屏蔽规则编号、设备名称">
                </div>
                <div class="filter-item">
                    <label>屏蔽类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="temporary">临时屏蔽</option>
                        <option value="scheduled">计划屏蔽</option>
                        <option value="conditional">条件屏蔽</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>屏蔽状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="active">生效中</option>
                        <option value="expired">已过期</option>
                        <option value="disabled">已禁用</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建屏蔽规则</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">规则编号</th>
                            <th width="150">设备名称</th>
                            <th width="100">屏蔽类型</th>
                            <th width="200">屏蔽条件</th>
                            <th width="120">生效时间</th>
                            <th width="120">失效时间</th>
                            <th width="100">屏蔽状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="shield-id" value="1"></td>
                            <td>SHIELD-001</td>
                            <td>生产设备A-001</td>
                            <td>临时屏蔽</td>
                            <td>维护期间屏蔽所有告警</td>
                            <td>2025-01-25 08:00</td>
                            <td>2025-01-25 18:00</td>
                            <td><span class="status-badge status-success">生效中</span></td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-default">编辑</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('告警屏蔽 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
