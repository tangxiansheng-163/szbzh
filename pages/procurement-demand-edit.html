<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求编辑 - 采购</title>
</head>
<body>
    <div class="content-wrapper">
        <form class="card" style="margin:0;" id="demand-edit-form">
            <div class="card-header"><h3 class="card-title">编辑采购需求单</h3></div>
            <div class="card-body">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;">
                    <div class="form-item"><label class="form-label">需求单号</label><input type="text" class="form-input" value="DEM-2025-001" readonly name="demandNo"></div>
                    <div class="form-item"><label class="form-label">需求部门</label><select class="form-select" name="department"><option value="">请选择</option><option value="production" selected>生产部</option><option value="rd">研发部</option><option value="quality">质量部</option><option value="logistics">物流部</option></select></div>
                    <div class="form-item"><label class="form-label">需求人</label><input type="text" class="form-input" value="张采购" readonly name="demandPerson"></div>
                    <div class="form-item"><label class="form-label">需求日期</label><input type="date" class="form-input" value="2025-01-15" readonly name="demandDate"></div>
                    <div class="form-item"><label class="form-label required">需求类型</label><select class="form-select" name="demandType" required><option value="">请选择</option><option value="production" selected>生产需求</option><option value="non-production">非生产需求</option><option value="maintenance">维修需求</option><option value="rd">研发需求</option></select></div>
                    <div class="form-item"><label class="form-label required">紧急程度</label><select class="form-select" name="urgency" required><option value="normal">普通</option><option value="important" selected>重要</option><option value="urgent">紧急</option></select></div>
                    <div class="form-item"><label class="form-label required">计划到货日期</label><input type="date" class="form-input" name="requiredDate" value="2025-02-15" required></div>
                    <div class="form-item"><label class="form-label">生产订单号</label><input type="text" class="form-input" name="productionOrderNo" value="PO-2025-001" placeholder="生产需求时必填"></div>
                    <div class="form-item"><label class="form-label">预算科目</label><input type="text" class="form-input" name="budgetSubject" value="生产物料-原料" placeholder="关联的预算科目"></div>
                    <div class="form-item"><label class="form-label">部门主管</label><input type="text" class="form-input" name="deptSupervisor" value="李主管" placeholder="需求部门主管"></div>
                    <div class="form-item" style="grid-column:1/-1;"><label class="form-label">用途说明</label><textarea class="form-input" name="usageDesc" rows="3" placeholder="物料用途详细说明">生产线扩产所需物料，包含原料及辅料。</textarea></div>
                    <div class="form-item" style="grid-column:1/-1;"><label class="form-label">备注</label><textarea class="form-input" name="remark" rows="2" placeholder="其他补充说明"></textarea></div>
                </div>
                <div class="section-title" style="margin:16px 0 8px;">需求明细（物料编码、名称、规格型号、需求数量、计量单位、参考价格、金额小计、建议供应商、备注）</div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th width="40"></th><th>物料编码</th><th>物料名称</th><th>规格型号</th><th>需求数量</th><th>计量单位</th><th>参考价格</th><th>金额小计</th><th>建议供应商</th><th>备注</th></tr></thead>
                        <tbody>
                            <tr><td><button type="button" class="btn btn-sm btn-default btn-remove-line">删</button></td><td><input type="text" class="form-input" value="M001" name="lineCode"></td><td><input type="text" class="form-input" value="原料A" name="lineName"></td><td><input type="text" class="form-input" value="规格1" name="lineSpec"></td><td><input type="number" class="form-input" value="100" min="0" name="lineQty"></td><td><input type="text" class="form-input" value="kg" name="lineUnit"></td><td><input type="number" class="form-input" value="120" min="0" step="0.01" name="linePrice"></td><td>12,000.00</td><td><input type="text" class="form-input" value="XX供应商" name="lineSupplier" placeholder="选填"></td><td><input type="text" class="form-input" name="lineRemark" placeholder="选填"></td></tr>
                            <tr><td><button type="button" class="btn btn-sm btn-default btn-remove-line">删</button></td><td><input type="text" class="form-input" value="M002" name="lineCode"></td><td><input type="text" class="form-input" value="辅料B" name="lineName"></td><td><input type="text" class="form-input" value="规格2" name="lineSpec"></td><td><input type="number" class="form-input" value="50" min="0" name="lineQty"></td><td><input type="text" class="form-input" value="件" name="lineUnit"></td><td><input type="number" class="form-input" value="80" min="0" step="0.01" name="linePrice"></td><td>4,000.00</td><td><input type="text" class="form-input" name="lineSupplier" placeholder="选填"></td><td><input type="text" class="form-input" name="lineRemark" placeholder="选填"></td></tr>
                        </tbody>
                    </table>
                </div>
                <p style="margin-top:8px;"><button type="button" class="btn btn-sm btn-default btn-add-line">+ 添加明细行</button></p>
            </div>
            <div class="form-actions" style="padding:12px 20px;border-top:1px solid #eee;"><button type="button" class="btn btn-default" data-close-modal="edit-modal">取消</button><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</body>
</html>
