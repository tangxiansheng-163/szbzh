<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据同步 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">数据接收与整合</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">数据同步</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理能源数据同步任务，包括同步配置、同步执行、同步监控等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="同步任务编号、数据源">
                </div>
                <div class="filter-item">
                    <label>数据源</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="scada">SCADA系统</option>
                        <option value="ems">EMS系统</option>
                        <option value="meter">电表系统</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>同步状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="syncing">同步中</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建同步任务</button>
                <button class="btn btn-default">手动同步</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">任务编号</th>
                            <th width="100">数据源</th>
                            <th width="150">同步对象</th>
                            <th width="100">同步频率</th>
                            <th width="100">同步状态</th>
                            <th width="120">最后同步时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="sync-id" value="1"></td>
                            <td>SYNC-2025-001</td>
                            <td>SCADA系统</td>
                            <td>生产车间能耗数据</td>
                            <td>每小时</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>2025-01-22 10:00</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-primary">手动同步</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" name="sync-id" value="2"></td>
                            <td>SYNC-2025-002</td>
                            <td>EMS系统</td>
                            <td>全厂能耗数据</td>
                            <td>每15分钟</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>2025-01-22 10:15</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 2 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('数据同步 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
