<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建技术任务</title>
</head>
<body>
    <div class="content-wrapper">
        <!-- 面包屑 -->
        <div class="breadcrumb">
            <a href="pages/dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">技术任务管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">创建技术任务</span>
        </div>

        <!-- 页面头部 -->
        <div class="page-header">
            <p class="page-description">来源：产销协同下推或人工创建</p>
        </div>

        <!-- 来源提示 -->
        <div class="card" style="margin-bottom: 16px;">
            <div class="card-body" style="padding: 12px 16px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: #1890ff; font-size: 16px;">ℹ️</span>
                    <span style="color: #666; font-size: 13px;">
                        <strong>创建说明:</strong>技术任务可由产销协同模块自动下推,或由研发部门手动创建。创建后需拆解为设计任务并分配给设计人员。
                    </span>
                </div>
            </div>
        </div>

        <!-- 表单卡片 -->
        <div class="card">
            <div class="card-body">
                <form id="tech-task-form">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label">任务编号</label>
                                <input type="text" class="form-input" name="taskCode" placeholder="系统自动生成" readonly>
                                <small style="color: #999; font-size: 12px;">系统自动生成</small>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label">任务来源</label>
                                <select class="form-select" name="source" disabled>
                                    <option value="manual">人工创建</option>
                                    <option value="system">产销协同下推</option>
                                </select>
                                <small style="color: #999; font-size: 12px;">原型中默认为"人工创建"</small>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">任务名称</label>
                                <input type="text" class="form-input" name="taskName" placeholder="请输入任务名称" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">负责人</label>
                                <select class="form-select" name="assignee" required>
                                    <option value="">请选择负责人</option>
                                    <option value="zhang">张工</option>
                                    <option value="li">李工</option>
                                    <option value="wang">王工</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">产品编码</label>
                                <input type="text" class="form-input" name="productCode" placeholder="请选择产品" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">产品名称</label>
                                <input type="text" class="form-input" name="productName" placeholder="自动带出" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="section-title" style="margin-top: 24px;">计划信息</div>
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">计划开始日期</label>
                                <input type="date" class="form-input" name="planStartDate" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-item">
                                <label class="form-label required">计划完成日期</label>
                                <input type="date" class="form-input" name="planEndDate" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-item">
                        <label class="form-label required">任务描述</label>
                        <textarea class="form-textarea" name="description" rows="4" placeholder="请详细描述技术任务的目标、要求等" required></textarea>
                    </div>

                    <div class="form-item">
                        <label class="form-label">备注</label>
                        <textarea class="form-textarea" name="remarks" rows="3" placeholder="其他补充说明"></textarea>
                    </div>

                    <!-- 系统自动字段提示 -->
                    <div class="section-title" style="margin-top: 24px;">系统字段(自动记录)</div>
                    <div style="background: #f5f5f5; padding: 16px; border-radius: 4px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 13px; color: #666;">
                            <div><strong>任务状态:</strong> <span style="color: #999;">待分配(创建后)</span></div>
                            <div><strong>实际开始日期:</strong> <span style="color: #999;">状态变更为"执行中"时自动记录</span></div>
                            <div><strong>实际完成日期:</strong> <span style="color: #999;">状态变更为"已完成"时自动记录</span></div>
                            <div><strong>进度:</strong> <span style="color: #999;">根据设计任务完成情况自动计算</span></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-primary btn-submit" data-form="#tech-task-form" data-list="pages/tech-task-list.html">提交</button>
                        <button type="button" class="btn btn-default btn-cancel" data-url="pages/tech-task-list.html">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <style>
            .section-title {
                font-size: 14px;
                font-weight: 600;
                color: rgba(0, 0, 0, 0.85);
                padding: 8px 0;
                border-bottom: 1px solid #e8e8e8;
                margin-bottom: 16px;
            }
        </style>
    </div>

    <script>
        console.log('创建技术任务 页面已加载');
    </script>
</body>
</html>
