<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 集成</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">系统联动</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">WMS 集成</span>
        </div>

        <div class="page-header">
            <p class="page-description">同步物料主数据、物料属性、计量单位、配料 BOM 至 WMS；支持库存查询、BOM 变更时的库存占用与预留。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>物料/类型</label>
                    <input type="text" class="form-input" placeholder="物料编码、物料名称">
                </div>
                <div class="filter-item">
                    <label>同步类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="material">物料主数据</option>
                        <option value="bom">配料 BOM</option>
                        <option value="unit">计量单位</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>同步状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary" data-open-modal="sync-wms-push-modal">手动同步</button>
                <button class="btn btn-default" data-open-modal="sync-wms-config-modal">配置</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>同步对象</th>
                            <th>同步类型</th>
                            <th>同步时间</th>
                            <th>状态</th>
                            <th>结果说明</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>物料主数据（增量）</td>
                            <td>物料主数据</td>
                            <td>2025-01-28 08:00</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>同步 15 条</td>
                            <td><button class="btn btn-sm btn-default" data-open-modal="sync-wms-push-modal">重新同步</button></td>
                        </tr>
                        <tr>
                            <td>配料 BOM PROD-001</td>
                            <td>配料 BOM</td>
                            <td>2025-01-28 10:25</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>—</td>
                            <td><button class="btn btn-sm btn-default" data-open-modal="sync-wms-push-modal">重新同步</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <div class="pagination-info">共 2 条记录</div>
                <div class="pagination-controls">
                    <button class="page-btn" disabled>&lt;</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn" disabled>&gt;</button>
                </div>
            </div>
        </div>
        <div id="sync-wms-push-modal" class="modal-overlay">
            <div class="modal" style="max-width:500px;" onclick="event.stopPropagation()">
                <div class="modal-header"><span class="modal-title">手动同步至 WMS</span><button type="button" class="modal-close">×</button></div>
                <div class="modal-body">
                    <p class="modal-desc" style="margin-bottom:16px;">选择同步类型，将物料主数据、配料 BOM 等同步至 WMS。</p>
                    <div class="form-item"><label class="form-label required">同步类型</label><select class="form-select"><option value="">请选择</option><option value="material">物料主数据</option><option value="bom">配料 BOM</option><option value="unit">计量单位</option></select></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-default" data-close-modal="sync-wms-push-modal">取消</button><button type="button" class="btn btn-primary" data-close-modal="sync-wms-push-modal" onclick="alert('✅ 同步任务已提交')">确认同步</button></div>
            </div>
        </div>
        <div id="sync-wms-config-modal" class="modal-overlay">
            <div class="modal" style="max-width:520px;" onclick="event.stopPropagation()">
                <div class="modal-header"><span class="modal-title">WMS 集成配置</span><button type="button" class="modal-close">×</button></div>
                <div class="modal-body">
                    <div class="form-item"><label class="form-label required">WMS 接口地址</label><input type="text" class="form-input" value="http://wms.internal/api"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-default" data-close-modal="sync-wms-config-modal">取消</button><button type="button" class="btn btn-primary" data-close-modal="sync-wms-config-modal" onclick="alert('✅ 配置已保存')">保存</button></div>
            </div>
        </div>
    </div>
    <script>if(typeof PageInteractions!=='undefined')PageInteractions.initButtons();</script>
</body>
</html>
