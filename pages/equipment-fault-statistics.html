<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上报统计 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">故障上报</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">上报统计</span>
        </div>

        <div class="page-header">
            <p class="page-description">统计故障上报数据，包括上报数量、故障类型分布、处理情况、响应时间等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>统计周期</label>
                    <select class="form-select">
                        <option value="month">月度</option>
                        <option value="quarter">季度</option>
                        <option value="year">年度</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>周期</label>
                    <input type="month" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">故障上报统计</h3>
            </div>
            <div class="card-body">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">上报总数</div>
                        <div class="stat-value">32</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">已处理</div>
                        <div class="stat-value">28</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">处理率</div>
                        <div class="stat-value">87.5%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">平均响应时间</div>
                        <div class="stat-value">1.5小时</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 4px; text-align: center; color: #999;">
                    故障上报趋势和类型分布图表展示区域（可集成ECharts等图表库）
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('上报统计 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
