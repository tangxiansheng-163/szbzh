<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM版本管理</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">BOM管理</span>
            <span class="breadcrumb-separator">/</span>
            <a href="#" class="breadcrumb-item" id="bom-list-link"></a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">版本管理</span>
        </div>
        <div class="page-header">
            <p class="page-description">一个产品对应一个 BOM，BOM 以<strong>版本</strong>演进，不可删除。本页为<strong>版本管理</strong>，展示指定产品某类型 BOM 的全部版本，可查看各版本详情。</p>
        </div>
        <div class="card">
            <div class="card-body" style="padding-bottom: 0;">
                <div class="form-info-grid" style="margin-bottom: 16px;">
                    <div class="form-info-item">
                        <span class="form-info-label">BOM 类型</span>
                        <span class="form-info-value" id="bom-type-label">EBOM</span>
                    </div>
                    <div class="form-info-item">
                        <span class="form-info-label">产品编码</span>
                        <span class="form-info-value" id="bom-product-code">—</span>
                    </div>
                    <div class="form-info-item">
                        <span class="form-info-label">产品名称</span>
                        <span class="form-info-value" id="bom-product-name">—</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="action-bar">
            <div class="action-left">
                <button type="button" class="btn btn-default btn-back" id="bom-version-back">← 返回列表</button>
            </div>
        </div>
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead id="bom-version-thead">
                        <tr>
                            <th width="70">版本号</th>
                            <th width="80">状态</th>
                            <th width="55">层级</th>
                            <th width="60">物料数</th>
                            <th width="70">创建人</th>
                            <th width="130">创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="bom-version-tbody">
                        <tr>
                            <td colspan="9" class="empty-cell">
                                <div class="empty-state">
                                    <div class="empty-icon">📋</div>
                                    <div class="empty-text">暂无版本</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <div class="pagination-info">共 0 条记录</div>
                <div class="pagination-controls">
                    <button type="button" class="page-btn" disabled>&lt;</button>
                    <button type="button" class="page-btn active">1</button>
                    <button type="button" class="page-btn" disabled>&gt;</button>
                </div>
            </div>
        </div>
        <div class="card bom-detail-tabs-card" id="bom-version-detail-card" style="display:none;">
            <div class="card-header card-header-with-tabs">
                <span class="card-title" id="bom-version-detail-title">—</span>

                    <label class="dt-detail-tab"><input type="radio" name="bom-version-tab" value="bom" checked> BOM 层级明细</label>
                    <label class="dt-detail-tab"><input type="radio" name="bom-version-tab" value="attach"> 图纸与附件</label>
                </div>
            </div>
            <div class="card-body">
                <div class="dt-detail-tab-pane" data-tab="bom">
                    <div class="table-wrapper">
                        <table class="bom-structure-table bom-readonly" id="bom-version-detail-table">

                            <tbody id="bom-version-detail-tbody"></tbody>
                        </table>
                    </div>
                </div>

                                    <th>物料编码</th>
                                    <th>物料名称</th>
                                    <th>规格型号</th>
                                    <th>文件名称</th>
                                    <th>版本</th>
                                    <th>格式</th>
                                    <th>上传时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="bom-version-attach-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div id="bom-version-publish-msg-modal" class="modal-overlay">
            <div class="modal" style="max-width: 360px;" onclick="event.stopPropagation()">

                </div>
            </div>

                </div>
            </div>
        </div>
