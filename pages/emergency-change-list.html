<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急变更 - 设计协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/design-workbench.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">变更管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">紧急变更</span>
        </div>

        <div class="page-header">
            <p class="page-description">处理紧急变更申请，快速响应紧急变更需求，简化审批流程。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>变更单号</label>
                    <input type="text" class="form-input" placeholder="变更单号">
                </div>
                <div class="filter-item">
                    <label>变更状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="pending">待审批</option>
                        <option value="approved">已批准</option>
                        <option value="executing">执行中</option>
                        <option value="completed">已完成</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>紧急程度</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="critical">紧急</option>
                        <option value="urgent">非常紧急</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建紧急变更</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="list-table-nowrap">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">变更单号</th>
                            <th width="150">变更内容</th>
                            <th width="100">紧急程度</th>
                            <th width="100">变更状态</th>
                            <th width="120">申请人</th>
                            <th width="120">申请时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="change-id" value="1"></td>
                            <td>EC-2025-001</td>
                            <td>物料A紧急替换</td>
                            <td><span class="status-badge" style="background: #ff4d4f;">非常紧急</span></td>
                            <td><span class="status-badge status-processing">执行中</span></td>
                            <td>张三</td>
                            <td>2025-01-22 10:00</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-primary">处理</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('紧急变更 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
