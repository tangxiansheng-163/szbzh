<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用途分类 - 设备管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/equipment-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">设备台账</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">用途分类</span>
        </div>

        <div class="page-header">
            <h1 class="page-title">用途分类管理</h1>
            <p class="page-description">管理设备用途分类体系，包括生产类、能源类、安环类、辅助类等维度的配置与管理。</p>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary" onclick="document.getElementById('category-add-modal').style.display='flex';document.body.style.overflow='hidden';">+ 新增分类</button>
                <button type="button" class="btn btn-default">批量导入</button>
                <button type="button" class="btn btn-default">导出</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 320px 1fr; gap: 24px;">
            <!-- 左侧分类树 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">分类结构</h3>
                </div>
                <div class="card-body" style="padding: 12px;">
                    <div style="font-size: 14px; line-height: 2;">
                        <div><strong>全部设备</strong></div>
                        <div style="padding-left: 20px;">▶ 按用途分类</div>
                        <div style="padding-left: 20px;">▶ 按关键等级</div>
                        <div style="padding-left: 20px;">▶ 按设备类型</div>
                    </div>
                </div>
            </div>

            <!-- 右侧分类详情 -->
            <div class="card" id="category-detail">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 class="card-title">分类详情</h3>
                    <div>
                        <button class="btn btn-sm btn-default" onclick="document.getElementById('category-edit-modal').style.display='flex';document.body.style.overflow='hidden';">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="document.getElementById('category-delete-modal').style.display='flex';document.body.style.overflow='hidden';">删除</button>
                    </div>
                </div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                        <div>
                            <div style="color: #8c8c8c; font-size: 12px; margin-bottom: 4px;">分类编码</div>
                            <div style="font-size: 14px; font-weight: 500;">ALL</div>
                        </div>
                        <div>
                            <div style="color: #8c8c8c; font-size: 12px; margin-bottom: 4px;">分类名称</div>
                            <div style="font-size: 14px; font-weight: 500;">全部设备</div>
                        </div>
                        <div>
                            <div style="color: #8c8c8c; font-size: 12px; margin-bottom: 4px;">上级分类</div>
                            <div style="font-size: 14px;">-</div>
                        </div>
                        <div>
                            <div style="color: #8c8c8c; font-size: 12px; margin-bottom: 4px;">分类层级</div>
                            <div style="font-size: 14px;">根级</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增分类弹窗 -->
    <div id="category-add-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:10000;align-items:center;justify-content:center;padding:24px;" onclick="if(event.target===this){this.style.display='none';document.body.style.overflow='';}">
        <div style="background:#fff;border-radius:8px;box-shadow:0 12px 48px rgba(0,0,0,0.18);width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0f0f0;">
                <span style="font-size:16px;font-weight:600;">新增分类</span>
                <button type="button" style="background:none;border:none;font-size:20px;cursor:pointer;color:#8c8c8c;" onclick="document.getElementById('category-add-modal').style.display='none';document.body.style.overflow='';">×</button>
            </div>
            <div style="padding:20px;overflow-y:auto;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <label style="font-size:13px;color:#262626;font-weight:500;">分类编码 <span style="color:#ff4d4f;">*</span></label>
                        <input type="text" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;" placeholder="请输入分类编码">
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <label style="font-size:13px;color:#262626;font-weight:500;">分类名称 <span style="color:#ff4d4f;">*</span></label>
                        <input type="text" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;" placeholder="请输入分类名称">
                    </div>
                </div>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:12px;padding:16px 20px;border-top:1px solid #f0f0f0;">
                <button type="button" style="padding:8px 16px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-add-modal').style.display='none';document.body.style.overflow='';">取消</button>
                <button type="button" style="padding:8px 16px;border:none;border-radius:6px;background:#1890ff;color:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-add-modal').style.display='none';document.body.style.overflow='';alert('✅ 分类新增成功')">保存</button>
            </div>
        </div>
    </div>

    <!-- 编辑分类弹窗 -->
    <div id="category-edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:10000;align-items:center;justify-content:center;padding:24px;" onclick="if(event.target===this){this.style.display='none';document.body.style.overflow='';}">
        <div style="background:#fff;border-radius:8px;box-shadow:0 12px 48px rgba(0,0,0,0.18);width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0f0f0;">
                <span style="font-size:16px;font-weight:600;">编辑分类</span>
                <button type="button" style="background:none;border:none;font-size:20px;cursor:pointer;color:#8c8c8c;" onclick="document.getElementById('category-edit-modal').style.display='none';document.body.style.overflow='';">×</button>
            </div>
            <div style="padding:20px;overflow-y:auto;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <label style="font-size:13px;color:#262626;font-weight:500;">分类编码 <span style="color:#ff4d4f;">*</span></label>
                        <input type="text" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;background:#f5f5f5;" value="CAT-001" readonly>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <label style="font-size:13px;color:#262626;font-weight:500;">分类名称 <span style="color:#ff4d4f;">*</span></label>
                        <input type="text" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;" value="生产类设备">
                    </div>
                </div>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:12px;padding:16px 20px;border-top:1px solid #f0f0f0;">
                <button type="button" style="padding:8px 16px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-edit-modal').style.display='none';document.body.style.overflow='';">取消</button>
                <button type="button" style="padding:8px 16px;border:none;border-radius:6px;background:#1890ff;color:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-edit-modal').style.display='none';document.body.style.overflow='';alert('✅ 分类信息已保存')">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除分类弹窗 -->
    <div id="category-delete-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:10000;align-items:center;justify-content:center;padding:24px;" onclick="if(event.target===this){this.style.display='none';document.body.style.overflow='';}">
        <div style="background:#fff;border-radius:8px;box-shadow:0 12px 48px rgba(0,0,0,0.18);width:100%;max-width:400px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0f0f0;">
                <span style="font-size:16px;font-weight:600;">确认删除</span>
                <button type="button" style="background:none;border:none;font-size:20px;cursor:pointer;color:#8c8c8c;" onclick="document.getElementById('category-delete-modal').style.display='none';document.body.style.overflow='';">×</button>
            </div>
            <div style="padding:32px 20px;text-align:center;">
                <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                <div style="font-size:16px;font-weight:600;margin-bottom:8px;">确定要删除该分类吗？</div>
                <div style="color:#8c8c8c;font-size:13px;">删除后，该分类下的设备将自动移至"未分类"</div>
            </div>
            <div style="display:flex;justify-content:center;gap:12px;padding:16px 20px;border-top:1px solid #f0f0f0;">
                <button type="button" style="padding:8px 16px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-delete-modal').style.display='none';document.body.style.overflow='';">取消</button>
                <button type="button" style="padding:8px 16px;border:none;border-radius:6px;background:#ff4d4f;color:#fff;cursor:pointer;font-size:13px;" onclick="document.getElementById('category-delete-modal').style.display='none';document.body.style.overflow='';alert('✅ 分类已删除')">确认删除</button>
            </div>
        </div>
    </div>
</body>
</html>
