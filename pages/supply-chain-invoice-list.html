<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票管理 - 供应链协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/supply-chain-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">结算协同</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">发票管理</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理供应链发票，包括发票登记、审核、认证、入账等全流程。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="发票号码、供应商、订单编号">
                </div>
                <div class="filter-item">
                    <label>发票状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="pending">待审核</option>
                        <option value="reviewing">审核中</option>
                        <option value="approved">已通过</option>
                        <option value="certified">已认证</option>
                        <option value="recorded">已入账</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>开票日期</label>
                    <input type="date" class="form-input">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 登记发票</button>
                <button class="btn btn-default">批量导入</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="list-table-nowrap">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">发票号码</th>
                            <th width="150">供应商</th>
                            <th width="120">订单编号</th>
                            <th width="120">发票金额</th>
                            <th width="100">税额</th>
                            <th width="100">发票状态</th>
                            <th width="120">开票日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="invoice-id" value="1"></td>
                            <td>INV-2025-010</td>
                            <td>深圳市电子科技</td>
                            <td>SO-2025-001</td>
                            <td>¥110,619.47</td>
                            <td>¥14,380.53</td>
                            <td><span class="status-badge status-warning">待审核</span></td>
                            <td>2025-01-20</td>
                            <td>
                                <button class="btn btn-sm btn-default btn-view" data-url="pages/supply-chain-invoice-detail.html" data-id="1">查看</button>
                                <button type="button" class="btn btn-sm btn-primary btn-approve-invoice-sc" data-id="1">审核</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
        <script>
        console.log('发票管理 页面已加载');
        if (typeof PageInteractions !== 'undefined') PageInteractions.initButtons();

        function money(n) {
            var num = parseFloat(n || 0) || 0;
            return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function ensureAssetLoaded(cb) {
            if (window.FinanceCollabStore) { cb(); return; }
            var s = document.createElement('script');
            s.src = 'assets/finance-collab-store.js';
            s.onload = cb;
            s.onerror = function () { console.warn('加载 finance-collab-store.js 失败'); };
            document.head.appendChild(s);
        }
        function renderList() {
            if (!window.FinanceCollabStore) return;
            var store = window.FinanceCollabStore.getStore();
            var tbody = document.querySelector('.card tbody');
            if (!tbody) return;

            var invoices = [];
            (store.settlements || []).forEach(function (s) {
                (s.invoices || []).forEach(function (inv) {
                    invoices.push({ inv: inv, settlement: s });
                });
            });

            if (!invoices.length) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#8c8c8c;padding:12px;">暂无发票</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            invoices.forEach(function (row) {
                var inv = row.inv;
                var s = row.settlement;
                var st = inv.status || '-';
                var stText = st === 'issued' ? '已开票（未发送）' : (st === 'sent' ? '已发送（待甲方审核）' : st);
                var op = (inv.status === 'issued'
                    ? '<button class="btn btn-sm btn-default btn-view" data-url="pages/supply-chain-invoice-detail.html" data-id="' + inv.id + '">查看</button> ' +
                      '<button type="button" class="btn btn-sm btn-primary btn-send" data-id="' + inv.id + '" data-settlement="' + s.id + '">发送</button>'
                    : '<button class="btn btn-sm btn-default btn-view" data-url="pages/supply-chain-invoice-detail.html" data-id="' + inv.id + '">查看</button>');

                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><input type="checkbox" name="invoice-id" value="' + inv.id + '"></td>' +
                    '<td>' + inv.id + '</td>' +
                    '<td>' + ((s.partyA && s.partyA.org) ? s.partyA.org : '-') + '</td>' +
                    '<td>' + (inv.orderId || '-') + '</td>' +
                    '<td>' + money(inv.amount || 0) + '</td>' +
                    '<td>' + money(inv.tax || 0) + '</td>' +
                    '<td><span class="status-badge status-warning">' + stText + '</span></td>' +
                    '<td>' + (inv.issueDate || '-') + '</td>' +
                    '<td>' + op + '</td>';
                tbody.appendChild(tr);
            });

            if (typeof PageInteractions !== 'undefined') PageInteractions.initButtons(document.querySelector('.card'));

            tbody.querySelectorAll('.btn-send').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var id = this.getAttribute('data-id');
                    var sid = this.getAttribute('data-settlement');
                    if (!id || !sid) return;
                    if (!confirm('发送发票 ' + id + ' 至甲方？')) return;
                    window.FinanceCollabStore.actionB_sendInvoice(sid, id);
                    renderList();
                });
            });
        }

        ensureAssetLoaded(renderList);
        </script>
    </div>
</body>
</html>
