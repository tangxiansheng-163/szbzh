<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES 集成</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">系统联动</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">MES 集成</span>
        </div>

        <div class="page-header">
            <p class="page-description">将 MBOM、工艺路线、工序信息同步至 MES；支持生产 BOM、领料清单、配方下发，接收生产进度与物料消耗反馈。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>BOM 编码/产品</label>
                    <input type="text" class="form-input" placeholder="BOM 编码、产品编码">
                </div>
                <div class="filter-item">
                    <label>同步类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="mbom">MBOM 同步</option>
                        <option value="process">工艺路线</option>
                        <option value="feeding">领料清单</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>同步状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary" data-open-modal="sync-mes-push-modal">手动同步</button>
                <button class="btn btn-default" data-open-modal="sync-mes-config-modal">配置</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>同步对象</th>
                            <th>产品/BOM</th>
                            <th>同步类型</th>
                            <th>同步时间</th>
                            <th>状态</th>
                            <th>结果说明</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>MBOM-001</td>
                            <td>PROD-001 智能控制器</td>
                            <td>MBOM 同步</td>
                            <td>2025-01-28 10:20</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>—</td>
                            <td><button class="btn btn-sm btn-default" data-open-modal="sync-mes-push-modal">重新同步</button></td>
                        </tr>
                        <tr>
                            <td>MBOM-001</td>
                            <td>PROD-001 智能控制器</td>
                            <td>领料清单</td>
                            <td>2025-01-28 10:21</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>—</td>
                            <td><button class="btn btn-sm btn-default" data-open-modal="sync-mes-push-modal">重新同步</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <div class="pagination-info">共 2 条记录</div>
                <div class="pagination-controls">
                    <button class="page-btn" disabled>&lt;</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn" disabled>&gt;</button>
                </div>
            </div>
        </div>
        <div id="sync-mes-push-modal" class="modal-overlay">
            <div class="modal" style="max-width:500px;" onclick="event.stopPropagation()">
                <div class="modal-header"><span class="modal-title">手动同步至 MES</span><button type="button" class="modal-close">×</button></div>
                <div class="modal-body">
                    <p class="modal-desc" style="margin-bottom:16px;">选择同步类型和对象，将 MBOM、工艺路线、领料清单等同步至 MES。</p>
                    <div class="form-item"><label class="form-label required">同步类型</label><select class="form-select"><option value="">请选择</option><option value="mbom">MBOM 同步</option><option value="process">工艺路线</option><option value="feeding">领料清单</option></select></div>
                    <div class="form-item"><label class="form-label required">选择对象</label><select class="form-select"><option value="">请选择</option><option value="MBOM-001">MBOM-001 PROD-001</option><option value="MBOM-002">MBOM-002 PROD-002</option></select></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-default" data-close-modal="sync-mes-push-modal">取消</button><button type="button" class="btn btn-primary" data-close-modal="sync-mes-push-modal" onclick="alert('✅ 同步任务已提交')">确认同步</button></div>
            </div>
        </div>
        <div id="sync-mes-config-modal" class="modal-overlay">
            <div class="modal" style="max-width:520px;" onclick="event.stopPropagation()">
                <div class="modal-header"><span class="modal-title">MES 集成配置</span><button type="button" class="modal-close">×</button></div>
                <div class="modal-body">
                    <div class="form-item"><label class="form-label required">MES 接口地址</label><input type="text" class="form-input" value="http://mes.internal/api"></div>
                    <div class="form-item"><label class="form-label">MBOM 发布后自动同步</label><select class="form-select"><option value="1">是</option><option value="0">否</option></select></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-default" data-close-modal="sync-mes-config-modal">取消</button><button type="button" class="btn btn-primary" data-close-modal="sync-mes-config-modal" onclick="alert('✅ 配置已保存')">保存</button></div>
            </div>
        </div>
    </div>
    <script>if(typeof PageInteractions!=='undefined')PageInteractions.initButtons();</script>
</body>
</html>
