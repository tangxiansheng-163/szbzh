<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款详情（甲方）- 采购协同</title>
    <style>
        .detail-header { background:#fff; border:1px solid #f0f0f0; border-radius:10px; padding:16px; margin-bottom:14px; }
        .detail-title { display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .detail-title h2 { margin:0; font-size:16px; }
        .detail-sub { margin-top:6px; font-size:13px; color:#8c8c8c; }
        .info-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px 16px; margin-top:12px; }
        .info-item { display:flex; flex-direction:column; gap:4px; }
        .info-label { font-size:12px; color:#8c8c8c; }
        .info-value { font-size:13px; color:#262626; font-weight:600; }
        .card { border:1px solid #f0f0f0; border-radius:10px; background:#fff; overflow:hidden; }
        .card-header { padding:12px 16px; background:#fafafa; border-bottom:1px solid #f0f0f0; font-weight:700; color:#262626; }
        .card-body { padding:16px; }
        .kv { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-top:1px solid #f0f0f0; }
        .kv:first-child { border-top:none; }
        .kv .k { font-size:13px; color:#8c8c8c; }
        .kv .v { font-size:13px; color:#262626; font-weight:600; }
        .link { color:#1890ff; text-decoration:none; }
        .link:hover { text-decoration:underline; }
        .tips { padding:12px 14px; background:#e6f7ff; border:1px solid #91d5ff; border-radius:8px; font-size:12px; color:#262626; margin-top:12px; line-height:1.7; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/procurement-dashboard.html" class="breadcrumb-item">工作台</a>
            <a href="pages/procurement-finance-settlement.html" class="breadcrumb-item">结算中心</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">付款详情</span>
        </div>

        <div class="detail-header">
            <div class="detail-title">
                <div>
                    <h2 id="pay-title">付款详情</h2>
                    <div id="pay-sub" class="detail-sub">-</div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button id="btn-approve" class="btn btn-primary" style="display:none;">审批通过</button>
                    <button id="btn-pay" class="btn btn-primary" style="display:none;">执行付款</button>
                    <button id="btn-back" class="btn btn-default">返回结算中心</button>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">付款单号</div>
                    <div id="pay-no" class="info-value">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">关联结算单</div>
                    <div class="info-value"><a id="pay-settle" class="link" href="pages/procurement-finance-settlement.html">-</a></div>
                </div>
                <div class="info-item">
                    <div class="info-label">供应商（乙方）</div>
                    <div id="pay-supplier" class="info-value">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">付款信息</div>
            <div class="card-body">
                <div class="kv"><div class="k">付款金额</div><div id="pay-amount" class="v">-</div></div>
                <div class="kv"><div class="k">付款方式</div><div id="pay-method" class="v">-</div></div>
                <div class="kv"><div class="k">付款状态</div><div id="pay-status" class="v">-</div></div>
                <div class="kv"><div class="k">申请日期</div><div id="pay-apply" class="v">-</div></div>
                <div class="kv"><div class="k">付款日期</div><div id="pay-date" class="v">-</div></div>

                <div class="tips">
                    甲方付款依据：结算单已对账，且发票已审核通过后，才进入付款申请与执行（原型中用按钮推进状态）。
                </div>
            </div>
        </div>
    </div>

    <script>
        function money(n) {
            var num = parseFloat(n || 0) || 0;
            return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function ensureAssetLoaded(cb) {
            if (window.FinanceCollabStore) { cb(); return; }
            var s = document.createElement('script');
            s.src = 'assets/finance-collab-store.js';
            s.onload = cb;
            s.onerror = function () { alert('加载 assets/finance-collab-store.js 失败'); };
            document.head.appendChild(s);
        }
        function getId() {
            try { return new URLSearchParams(window.location.search).get('id') || ''; } catch (e) { return ''; }
        }
        function findPayment(store, paymentId) {
            var settlements = store.settlements || [];
            for (var i = 0; i < settlements.length; i++) {
                var s = settlements[i];
                var p = (s.payments || []).find(function (x) { return x.id === paymentId; });
                if (p) return { settlement: s, payment: p };
            }
            return null;
        }
        function render() {
            var store = window.FinanceCollabStore.getStore();
            var id = getId();
            if (!id) { document.getElementById('pay-sub').textContent = '缺少付款ID'; return; }
            var found = findPayment(store, id);
            if (!found) { document.getElementById('pay-sub').textContent = '未找到付款：' + id; return; }

            var s = found.settlement;
            var p = found.payment;
            window.FinanceCollabStore.setActiveSettlement(s.id);

            document.getElementById('pay-title').textContent = '付款详情 · ' + p.id;
            document.getElementById('pay-sub').textContent = '结算单 ' + s.id + ' · ' + ((s.partyB && s.partyB.org) ? s.partyB.org : '-');
            document.getElementById('pay-no').textContent = p.id;
            document.getElementById('pay-supplier').textContent = (s.partyB && s.partyB.org) ? s.partyB.org : '-';
            var link = document.getElementById('pay-settle');
            link.textContent = s.id;
            link.href = 'pages/procurement-finance-settlement.html?id=' + encodeURIComponent(s.id);
            document.getElementById('pay-amount').textContent = money(p.amount || 0);
            document.getElementById('pay-method').textContent = p.method || '-';
            document.getElementById('pay-apply').textContent = p.applyDate || '-';
            document.getElementById('pay-date').textContent = p.payDate || '-';

            var st = p.status || '-';
            var stText = st === 'submitted' ? '待审批' : (st === 'approved' ? '已批准（待付款）' : (st === 'paid' ? '已付款' : st));
            document.getElementById('pay-status').textContent = stText;

            var btnApprove = document.getElementById('btn-approve');
            var btnPay = document.getElementById('btn-pay');
            btnApprove.style.display = 'none';
            btnPay.style.display = 'none';

            if (p.status === 'submitted') {
                btnApprove.style.display = 'inline-block';
                btnApprove.onclick = function () {
                    if (!confirm('审批通过付款单 ' + p.id + '？')) return;
                    window.FinanceCollabStore.actionA_approvePayment(s.id, p.id);
                    render();
                    alert('已审批通过。');
                };
            }
            if (p.status === 'approved') {
                btnPay.style.display = 'inline-block';
                btnPay.onclick = function () {
                    if (!confirm('执行付款 ' + p.id + '？')) return;
                    window.FinanceCollabStore.actionA_pay(s.id, p.id);
                    render();
                    alert('已执行付款（乙方将同步收到收款记录）。');
                };
            }

            document.getElementById('btn-back').onclick = function () {
                if (typeof PageLoader !== 'undefined' && PageLoader.loadPage) PageLoader.loadPage('pages/procurement-finance-settlement.html?id=' + encodeURIComponent(s.id));
                else window.location.href = 'pages/procurement-finance-settlement.html?id=' + encodeURIComponent(s.id);
            };
        }
        ensureAssetLoaded(render);
    </script>
</body>
</html>
