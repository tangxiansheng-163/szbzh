<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑绩效配置 - 采购协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/procurement-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">系统配置</span>
            <span class="breadcrumb-separator">/</span>
            <a href="pages/procurement-supplier-performance-config.html" class="breadcrumb-item">绩效配置</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">编辑</span>
        </div>

        <div class="page-header">
            <p class="page-description">编辑绩效配置，修改评估维度权重、评估周期、等级划分规则等。保存后用于按周期自动生成供应商评估报表。</p>
        </div>

        <div class="card">
            <div class="section-title" style="margin-bottom:12px;">基本信息</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;max-width:560px;">
                <div class="form-item">
                    <label class="form-label">配置编号</label>
                    <div class="form-value" style="color:#666;">PC-2025-001</div>
                </div>
                <div class="form-item">
                    <label class="form-label required">配置名称</label>
                    <input type="text" class="form-input" value="供应商季度绩效评估配置" placeholder="如：供应商季度绩效评估配置">
                </div>
                <div class="form-item">
                    <label class="form-label required">评估周期</label>
                    <select class="form-select">
                        <option value="monthly">月度</option>
                        <option value="quarterly" selected>季度</option>
                        <option value="annual">年度</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">报表生成日</label>
                    <input type="text" class="form-input" value="周期结束后次月1日" placeholder="如：次月1日、次月5日">
                </div>
                <div class="form-item">
                    <label class="form-label">状态</label>
                    <select class="form-select">
                        <option value="enabled" selected>已启用</option>
                        <option value="disabled">已停用</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top:16px;">
            <div class="section-title" style="margin-bottom:12px;">评估维度与权重</div>
            <p style="color:#666;font-size:13px;margin-bottom:16px;">各维度权重之和须为 100%。</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;max-width:560px;">
                <div class="form-item">
                    <label class="form-label">供货维度权重（%）</label>
                    <input type="number" class="form-input weight-input" value="25" min="0" max="100">
                </div>
                <div class="form-item">
                    <label class="form-label">质量维度权重（%）</label>
                    <input type="number" class="form-input weight-input" value="30" min="0" max="100">
                </div>
                <div class="form-item">
                    <label class="form-label">价格维度权重（%）</label>
                    <input type="number" class="form-input weight-input" value="25" min="0" max="100">
                </div>
                <div class="form-item">
                    <label class="form-label">服务维度权重（%）</label>
                    <input type="number" class="form-input weight-input" value="20" min="0" max="100">
                </div>
            </div>
            <div style="margin-top:8px;font-size:13px;color:#666;">当前合计：<span id="weight-sum">100</span>%</div>
        </div>

        <div class="card" style="margin-top:16px;">
            <div class="section-title" style="margin-bottom:12px;">等级划分规则</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="120">等级</th>
                            <th width="200">综合得分区间</th>
                            <th width="120">说明</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>A级</td>
                            <td><input type="number" class="form-input" style="width:60px;" value="85"> 分 ≤ 得分 ≤ 100 分</td>
                            <td><input type="text" class="form-input" value="优秀供应商" style="width:100%;"></td>
                        </tr>
                        <tr>
                            <td>B级</td>
                            <td><input type="number" class="form-input" style="width:60px;" value="70"> 分 ≤ 得分 &lt; 85 分</td>
                            <td><input type="text" class="form-input" value="合格供应商" style="width:100%;"></td>
                        </tr>
                        <tr>
                            <td>C级</td>
                            <td><input type="number" class="form-input" style="width:60px;" value="60"> 分 ≤ 得分 &lt; 70 分</td>
                            <td><input type="text" class="form-input" value="待改进" style="width:100%;"></td>
                        </tr>
                        <tr>
                            <td>D级</td>
                            <td>得分 &lt; 60 分</td>
                            <td><input type="text" class="form-input" value="不合格" style="width:100%;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="action-bar" style="margin-top:16px;">
            <div class="action-left">
                <button type="button" class="btn btn-primary" onclick="alert('保存成功');location.href='pages/procurement-supplier-performance-config.html'">保存</button>
                <a href="pages/procurement-supplier-performance-config-detail.html?id=1" class="btn btn-default">取消</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var inputs = document.querySelectorAll('.weight-input');
            function updateSum() {
                var sum = 0;
                inputs.forEach(function (el) { sum += parseInt(el.value || 0, 10); });
                var el = document.getElementById('weight-sum');
                if (el) el.textContent = sum;
            }
            inputs.forEach(function (el) {
                el.addEventListener('input', updateSum);
                el.addEventListener('change', updateSum);
            });
        })();
    </script>
</body>
</html>
