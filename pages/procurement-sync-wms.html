<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 集成 - 采购协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/procurement-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">系统协同</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">WMS 集成</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理采购系统与WMS系统的数据集成，包括收货同步、入库同步、库存查询等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>关键词</label>
                    <input type="text" class="form-input" placeholder="同步任务编号">
                </div>
                <div class="filter-item">
                    <label>同步类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="receipt">收货同步</option>
                        <option value="inbound">入库同步</option>
                        <option value="inventory">库存查询</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>同步状态</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="syncing">同步中</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建同步任务</button>
                <button class="btn btn-default">手动同步</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="list-table-nowrap">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">同步任务编号</th>
                            <th width="100">同步类型</th>
                            <th width="150">同步对象</th>
                            <th width="100">同步方向</th>
                            <th width="100">同步状态</th>
                            <th width="120">同步时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="sync-id" value="1"></td>
                            <td>SYNC-2025-003</td>
                            <td>收货同步</td>
                            <td>REC-2025-001</td>
                            <td>采购→WMS</td>
                            <td><span class="status-badge status-success">成功</span></td>
                            <td>2025-01-20 14:20</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('WMS 集成 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
