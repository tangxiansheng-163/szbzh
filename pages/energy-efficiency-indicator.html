<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能效指标 - 能源管理协同系统</title>
</head>
<body>
    <div class="content-wrapper">
        <div class="breadcrumb">
            <a href="pages/energy-dashboard.html" class="breadcrumb-item">工作台</a>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item">能效优化分析</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active">能效指标</span>
        </div>

        <div class="page-header">
            <p class="page-description">管理能效指标，包括指标定义、指标计算、指标监控、指标分析等。</p>
        </div>

        <div class="filter-bar">
            <div class="filter-row">
                <div class="filter-item">
                    <label>指标类型</label>
                    <select class="form-select">
                        <option value="">全部</option>
                        <option value="unit-consumption">单耗</option>
                        <option value="efficiency-ratio">能效比</option>
                        <option value="energy-intensity">能源强度</option>
                    </select>
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: center;">
                    <button class="btn btn-primary">查询</button>
                    <button class="btn btn-default">重置</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-left">
                <button class="btn btn-primary">+ 新建指标</button>
                <button class="btn btn-default">导出</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" class="select-all-checkbox"></th>
                            <th width="120">指标编码</th>
                            <th width="150">指标名称</th>
                            <th width="100">指标类型</th>
                            <th width="100">当前值</th>
                            <th width="100">目标值</th>
                            <th width="100">完成率</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" name="indicator-id" value="1"></td>
                            <td>IND-001</td>
                            <td>产品单耗</td>
                            <td>单耗</td>
                            <td>48 kWh/件</td>
                            <td>50 kWh/件</td>
                            <td style="color: #52c41a;">96%</td>
                            <td>
                                <button class="btn btn-sm btn-default">查看</button>
                                <button class="btn btn-sm btn-default">编辑</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span class="pagination-info">共 1 条记录</span>
                <div class="pagination-controls">
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span class="pagination-page">第 1 页 / 共 1 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('能效指标 页面已加载');
        if (typeof PageInteractions !== 'undefined') {
            PageInteractions.initButtons();
        }
    </script>
</body>
</html>
